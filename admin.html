<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seacoast RVIP Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#f3f3f3;min-height:100vh}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;font-size:16px;vertical-align:middle}
button{cursor:pointer}
a{text-decoration:none}

/* LOGIN */
#pg-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-box{background:white;border-left:4px solid #775a19;padding:2rem;width:100%;max-width:320px}
.login-title{text-align:center;margin-bottom:2rem}
.login-title h1{font-size:1.5rem;font-weight:700}
.login-title p{font-size:0.65rem;color:#999;text-transform:uppercase;letter-spacing:0.15em;margin-top:4px}
.lbl{font-family:'Work Sans',sans-serif;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:#888;display:block;margin-bottom:6px}
.inp{width:100%;background:#f9f9f9;border:1.5px solid #e2e2e2;padding:0.75rem;font-family:'Inter',sans-serif;font-size:1rem;outline:none}
.inp:focus{border-color:#775a19}
#login-err{color:#dc2626;font-size:0.8rem;text-align:center;padding:0.5rem;display:none}
.btn-login{width:100%;background:#000;color:white;font-family:'Work Sans',sans-serif;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;padding:0.875rem;border:none;margin-top:1rem;border-bottom:3px solid #775a19}

/* DASHBOARD */
#pg-dash{display:none}
.topbar{background:white;border-bottom:1px solid #e8e8e8;padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:10}
.topbar-title{font-weight:700;font-size:1rem}
.topbar-sub{font-size:0.6rem;color:#999;text-transform:uppercase;letter-spacing:0.1em}
.stats{display:grid;grid-template-columns:repeat(4,1fr);background:white;border-bottom:1px solid #e8e8e8}
.stat{padding:0.875rem 0.5rem;text-align:center;border-right:1px solid #f0f0f0}
.stat:last-child{border:none}
.stat-num{font-size:1.5rem;font-weight:700}
.stat-lbl{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-top:2px}
.tabs{display:flex;background:white;border-bottom:1px solid #e8e8e8;overflow-x:auto}
.tab-btn{padding:0.75rem 1rem;font-family:'Work Sans',sans-serif;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#888;background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap}
.tab-btn.on{color:#000;border-bottom-color:#775a19}
.content{padding:1rem;max-width:1000px;margin:0 auto}

/* BUTTONS */
.bg{background:#775a19;color:white;font-family:'Work Sans',sans-serif;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:0.5rem 0.875rem;border:none;display:inline-flex;align-items:center;gap:5px}
.bd{background:#000;color:white;font-family:'Work Sans',sans-serif;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:0.5rem 0.875rem;border:none;display:inline-flex;align-items:center;gap:5px}
.bo{background:white;color:#000;font-family:'Work Sans',sans-serif;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:0.5rem 0.875rem;border:1px solid #e2e2e2;display:inline-flex;align-items:center;gap:5px}
.bgr{background:#16a34a;color:white;font-family:'Work Sans',sans-serif;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;padding:0.5rem 0.875rem;border:none;display:inline-flex;align-items:center;gap:5px}
.br{background:#dc2626;color:white;padding:0.4rem 0.6rem;border:none;display:inline-flex;align-items:center}

/* BOOKING CARD */
.bk-card{background:white;border-left:3px solid #775a19;padding:1rem;margin-bottom:0.75rem}
.bk-name{font-weight:700;font-size:1rem}
.bk-code{font-family:monospace;font-size:0.7rem;color:#775a19;background:#fdfaf4;padding:2px 6px;border:1px solid #e8c97a;margin-left:8px}
.bk-meta{font-size:0.78rem;color:#555;margin-top:4px}
.bk-price{font-size:1.75rem;font-weight:700;color:#775a19}
.badge{display:inline-block;padding:2px 8px;font-size:0.65rem;font-family:'Work Sans',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-left:6px}
.b-pending{background:#fef9c3;color:#a16207}
.b-confirmed{background:#dbeafe;color:#1d4ed8}
.b-paid{background:#dcfce7;color:#15803d}
.b-completed{background:#dcfce7;color:#15803d}
.b-cancelled{background:#fee2e2;color:#dc2626}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:50;overflow-y:auto;padding:1rem;display:none}
.modal{background:white;max-width:640px;margin:2rem auto}
.modal-hd{padding:1rem 1.5rem;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center}
.modal-hd h2{font-weight:700;font-size:1rem}
.modal-bd{padding:1.5rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.875rem}
.form-grid .full{grid-column:span 2}
.flbl{font-family:'Work Sans',sans-serif;font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:#888;display:block;margin-bottom:4px}
.finp{width:100%;background:#f9f9f9;border:1px solid #e2e2e2;padding:0.6rem 0.75rem;font-family:'Inter',sans-serif;font-size:0.875rem;outline:none}
.finp:focus{border-color:#775a19}
.fsel{width:100%;background:#f9f9f9;border:1px solid #e2e2e2;padding:0.6rem 0.75rem;font-family:'Inter',sans-serif;font-size:0.875rem;outline:none;appearance:none}

/* TOAST */
#toast{position:fixed;top:1rem;right:1rem;z-index:200;background:#000;color:white;padding:0.75rem 1.25rem;font-family:'Work Sans',sans-serif;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;border-left:3px solid #775a19;display:none}

/* EMPTY */
.empty{text-align:center;padding:3rem 0;color:#bbb}
.empty .material-symbols-outlined{font-size:3rem;display:block;margin-bottom:0.75rem}
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="toast"></div>

<!-- ═══ LOGIN ═══ -->
<div id="pg-login">
  <div>
    <div class="login-title">
      <h1>Seacoast RVIP</h1>
      <p>Private Admin</p>
    </div>
    <div class="login-box">
      <label class="lbl">Password</label>
      <input class="inp" id="pwd" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
      <div id="login-err">Wrong password. Please try again.</div>
      <button class="btn-login" onclick="doLogin()">Enter Dashboard</button>
    </div>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="pg-dash">

  <!-- Top bar -->
  <div class="topbar">
    <div>
      <div class="topbar-title">Seacoast RVIP</div>
      <div class="topbar-sub">Admin Dashboard &nbsp;·&nbsp; <span id="today"></span></div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="bg" onclick="openAdd()"><span class="material-symbols-outlined">add</span>New Booking</button>
      <button class="bo" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div id="s1" class="stat-num">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div id="s2" class="stat-num" style="color:#775a19">0</div><div class="stat-lbl">Upcoming</div></div>
    <div class="stat"><div id="s3" class="stat-num" style="color:#16a34a">$0</div><div class="stat-lbl">Collected</div></div>
    <div class="stat"><div id="s4" class="stat-num" style="color:#d97706">0</div><div class="stat-lbl">Awaiting Pay</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn on" onclick="setTab('all',this)">All</button>
    <button class="tab-btn" onclick="setTab('upcoming',this)">Upcoming</button>
    <button class="tab-btn" onclick="setTab('awaiting',this)">Awaiting Payment</button>
    <button class="tab-btn" onclick="setTab('done',this)">Completed</button>
  </div>

  <!-- Bookings -->
  <div class="content">
    <div id="bk-list"></div>
    <div id="bk-empty" class="empty" style="display:none">
      <span class="material-symbols-outlined">directions_car</span>
      <div>No bookings yet</div>
      <button class="bg" style="margin-top:1rem" onclick="openAdd()">Add First Booking</button>
    </div>
  </div>
</div>

<!-- ═══ ADD/EDIT MODAL ═══ -->
<div class="overlay" id="m-add">
  <div class="modal">
    <div class="modal-hd">
      <h2 id="m-add-ttl">New Booking</h2>
      <button onclick="closeAdd()" style="background:none;border:none;font-size:1.25rem;color:#888">✕</button>
    </div>
    <div class="modal-bd">
      <input type="hidden" id="e-id"/>
      <div class="form-grid">
        <div><label class="flbl">Client Name *</label><input id="e-name" class="finp" placeholder="John Smith"/></div>
        <div><label class="flbl">Phone *</label><input id="e-phone" class="finp" placeholder="+1 (603) 000-0000" type="tel"/></div>
        <div><label class="flbl">Email</label><input id="e-email" class="finp" placeholder="client@email.com" type="email"/></div>
        <div><label class="flbl">Service *</label>
          <select id="e-service" class="fsel">
            <option>Airport Transfer — Boston Logan</option>
            <option>Airport Transfer — Manchester MHT</option>
            <option>Night Out</option>
            <option>Casino Run</option>
            <option>Special Event</option>
            <option>Medical Appointment</option>
            <option>Other</option>
          </select>
        </div>
        <div><label class="flbl">Date *</label><input id="e-date" class="finp" type="date"/></div>
        <div><label class="flbl">Pickup Time *</label><input id="e-time" class="finp" type="time"/></div>
        <div class="full"><label class="flbl">Pickup Address</label><input id="e-pickup" class="finp" placeholder="Full pickup address"/></div>
        <div class="full"><label class="flbl">Destination</label><input id="e-dest" class="finp" placeholder="Airport, venue, or address"/></div>
        <div><label class="flbl">Vehicle</label>
          <select id="e-vehicle" class="fsel">
            <option>Black SUV Luxury</option>
            <option>Regular SUV</option>
          </select>
        </div>
        <div><label class="flbl">Passengers</label>
          <select id="e-pass" class="fsel">
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6+</option>
          </select>
        </div>
        <div><label class="flbl">💰 Price ($) *</label><input id="e-price" class="finp" placeholder="95" type="number" min="0" step="5"/></div>
        <div><label class="flbl">Payment Method</label>
          <select id="e-paymeth" class="fsel">
            <option>Card / Apple Pay</option>
            <option>Venmo</option>
            <option>Cash on Arrival</option>
          </select>
        </div>
        <div><label class="flbl">Status</label>
          <select id="e-status" class="fsel">
            <option>Pending</option>
            <option>Confirmed</option>
            <option>Paid</option>
            <option>Completed</option>
            <option>Cancelled</option>
          </select>
        </div>
        <div>
          <label class="flbl">Confirmation Code</label>
          <div style="display:flex;gap:6px">
            <input id="e-code" class="finp" placeholder="RVIP-0000-XXX" style="font-family:monospace;letter-spacing:0.08em"/>
            <button onclick="makeCode()" class="bo" style="padding:0.5rem 0.75rem;flex-shrink:0"><span class="material-symbols-outlined">refresh</span></button>
          </div>
        </div>
        <div class="full"><label class="flbl">Notes / Flight Number</label><input id="e-notes" class="finp" placeholder="Flight number, special requests..."/></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem">
        <button onclick="closeAdd()" class="bo">Cancel</button>
        <button onclick="saveBk()" class="bd" style="padding:0.75rem 2rem">Save Booking</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SEND PAYMENT MODAL ═══ -->
<div class="overlay" id="m-pay">
  <div class="modal" style="max-width:460px">
    <div class="modal-hd">
      <h2>Send Payment Link</h2>
      <button onclick="closePay()" style="background:none;border:none;font-size:1.25rem;color:#888">✕</button>
    </div>
    <div class="modal-bd" id="m-pay-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — CHANGE THESE
var PWD  = 'seacoast2025';
var SITE = 'https://seacoast-rvip-complete-final-firmsu.vercel.app';

// FIREBASE CONFIG
// ⚠️ Replace with YOUR Firebase config after setup
// Get it from: console.firebase.google.com
// Project Settings → Your Apps → Web App → Config
var FB_CONFIG = {
  apiKey:            "AIzaSyDGel0ktZDQYcdlOuoZo4bAqZWCuGvOVbc",
  authDomain:        "seacoast-rip.firebaseapp.com",
  projectId:         "seacoast-rip",
  storageBucket:     "seacoast-rip.firebasestorage.app",
  messagingSenderId: "684535453116",
  appId:             "1:684535453116:web:922c843b5bad3b81ad47b9"
};
// ═══════════════════════════════════════════════════

// Firebase state
var db = null;
var fbReady = false;

function initFirebase() {
  try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.firestore();
    fbReady = true;
    console.log('✅ Firebase connected');
  } catch(e) {
    console.log('Firebase not configured yet — using localStorage');
    fbReady = false;
  }
}

var activeTab = 'all';

// ── LOGIN ──
function doLogin() {
  var v = document.getElementById('pwd').value;
  if (v === PWD) {
    localStorage.setItem('rv-auth','1');
    goToDash();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

async function goToDash() {
  document.getElementById('pg-login').style.display = 'none';
  document.getElementById('pg-dash').style.display = 'block';
  document.getElementById('today').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  // Load from Firebase if connected
  if (fbReady) {
    toast('Loading bookings...');
    await fbLoad();
  }
  render();
}

function doLogout() {
  localStorage.removeItem('rv-auth');
  document.getElementById('pg-dash').style.display = 'none';
  document.getElementById('pg-login').style.display = 'flex';
  document.getElementById('pwd').value = '';
}

// ── DATA — Firebase + localStorage fallback ──
function getBks() {
  try { return JSON.parse(localStorage.getItem('rv-bks') || '[]'); }
  catch(e) { return []; }
}
function setBks(b) {
  localStorage.setItem('rv-bks', JSON.stringify(b));
}

// Save single booking to Firebase
async function fbSave(bk) {
  if (!fbReady) return;
  try {
    await db.collection('bookings').doc(bk.id).set(bk);
    console.log('✅ Saved to Firebase:', bk.code);
  } catch(e) {
    console.error('Firebase save error:', e);
  }
}

// Delete from Firebase
async function fbDelete(id) {
  if (!fbReady) return;
  try {
    await db.collection('bookings').doc(id).delete();
  } catch(e) {
    console.error('Firebase delete error:', e);
  }
}

// Load all bookings from Firebase
async function fbLoad() {
  if (!fbReady) return false;
  try {
    var snap = await db.collection('bookings').get();
    var bks = [];
    snap.forEach(function(doc) { bks.push(doc.data()); });
    localStorage.setItem('rv-bks', JSON.stringify(bks));
    console.log('✅ Loaded '+bks.length+' bookings from Firebase');
    return true;
  } catch(e) {
    console.error('Firebase load error:', e);
    return false;
  }
}

// ── RENDER ──
function render() {
  var bks = getBks();
  var up = bks.filter(function(b){ return b.status==='Pending'||b.status==='Confirmed'; }).length;
  var rev = bks.filter(function(b){ return b.status==='Paid'||b.status==='Completed'; }).reduce(function(s,b){ return s+(parseFloat(b.price)||0); },0);
  var aw = bks.filter(function(b){ return b.status==='Confirmed'; }).length;
  document.getElementById('s1').textContent = bks.length;
  document.getElementById('s2').textContent = up;
  document.getElementById('s3').textContent = '$'+rev.toFixed(0);
  document.getElementById('s4').textContent = aw;

  var f = bks.filter(function(b){
    if(activeTab==='all') return true;
    if(activeTab==='upcoming') return b.status==='Pending'||b.status==='Confirmed';
    if(activeTab==='awaiting') return b.status==='Confirmed';
    if(activeTab==='done') return b.status==='Paid'||b.status==='Completed';
    return true;
  }).sort(function(a,b){ return new Date(a.date)-new Date(b.date); });

  var el = document.getElementById('bk-list');
  var em = document.getElementById('bk-empty');

  if (!f.length) { el.innerHTML=''; em.style.display='block'; return; }
  em.style.display='none';

  var bc = {Pending:'b-pending',Confirmed:'b-confirmed',Paid:'b-paid',Completed:'b-completed',Cancelled:'b-cancelled'};

  el.innerHTML = f.map(function(b){
    return '<div class="bk-card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap">'+
        '<div style="flex:1;min-width:200px">'+
          '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:6px">'+
            '<span class="bk-name">'+b.name+'</span>'+
            '<span class="badge '+(bc[b.status]||'b-pending')+'">'+b.status+'</span>'+
            '<span class="bk-code">'+b.code+'</span>'+
          '</div>'+
          '<div class="bk-meta"><span class="material-symbols-outlined">calendar_today</span> '+b.date+' at '+ft(b.time)+'</div>'+
          '<div class="bk-meta"><span class="material-symbols-outlined">directions_car</span> '+b.service+'</div>'+
          (b.pickup?'<div class="bk-meta"><span class="material-symbols-outlined">location_on</span> '+b.pickup+' → '+b.destination+'</div>':'')+
          '<div class="bk-meta"><span class="material-symbols-outlined">phone</span> '+b.phone+(b.email?' · '+b.email:'')+'</div>'+
          (b.notes?'<div class="bk-meta" style="color:#888">📝 '+b.notes+'</div>':'')+
        '</div>'+
        '<div style="text-align:right;flex-shrink:0">'+
          '<div class="bk-price">$'+b.price+'</div>'+
          '<div style="font-size:0.7rem;color:#888;margin-bottom:10px">'+b.paymentMethod+'</div>'+
          '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">'+
            '<button class="bg" onclick="openPay(\''+b.id+'\')"><span class="material-symbols-outlined">send</span>Send Link</button>'+
            '<button class="bo" onclick="editBk(\''+b.id+'\')"><span class="material-symbols-outlined">edit</span></button>'+
            '<button class="br" onclick="delBk(\''+b.id+'\')"><span class="material-symbols-outlined">delete</span></button>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function ft(t) {
  if(!t) return '';
  try { var p=t.split(':'),h=parseInt(p[0]),m=p[1],a=h>=12?'PM':'AM'; h=h%12||12; return h+':'+m+' '+a; }
  catch(e){ return t; }
}

function setTab(tab,btn) {
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  render();
}

// ── ADD/EDIT ──
function openAdd() {
  document.getElementById('m-add-ttl').textContent = 'New Booking';
  document.getElementById('e-id').value = '';
  ['e-name','e-phone','e-email','e-date','e-time','e-pickup','e-dest','e-price','e-code','e-notes'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('e-status').value = 'Confirmed';
  makeCode();
  document.getElementById('m-add').style.display = 'block';
}

function editBk(id) {
  var b = getBks().find(function(x){ return x.id===id; });
  if (!b) return;
  document.getElementById('m-add-ttl').textContent = 'Edit Booking';
  document.getElementById('e-id').value = id;
  document.getElementById('e-name').value = b.name||'';
  document.getElementById('e-phone').value = b.phone||'';
  document.getElementById('e-email').value = b.email||'';
  document.getElementById('e-service').value = b.service||'';
  document.getElementById('e-date').value = b.date||'';
  document.getElementById('e-time').value = b.time||'';
  document.getElementById('e-pickup').value = b.pickup||'';
  document.getElementById('e-dest').value = b.destination||'';
  document.getElementById('e-vehicle').value = b.vehicle||'Black SUV Luxury';
  document.getElementById('e-pass').value = b.passengers||'1';
  document.getElementById('e-price').value = b.price||'';
  document.getElementById('e-paymeth').value = b.paymentMethod||'Card / Apple Pay';
  document.getElementById('e-status').value = b.status||'Confirmed';
  document.getElementById('e-code').value = b.code||'';
  document.getElementById('e-notes').value = b.notes||'';
  document.getElementById('m-add').style.display = 'block';
}

function closeAdd() { document.getElementById('m-add').style.display = 'none'; }

function makeCode() {
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ';
  var n=String(Math.floor(Math.random()*9000)+1000);
  var r=c[Math.floor(Math.random()*c.length)]+c[Math.floor(Math.random()*c.length)]+c[Math.floor(Math.random()*c.length)];
  document.getElementById('e-code').value='RVIP-'+n+'-'+r;
}

function saveBk() {
  var nm=document.getElementById('e-name').value.trim();
  var ph=document.getElementById('e-phone').value.trim();
  var pr=document.getElementById('e-price').value.trim();
  var dt=document.getElementById('e-date').value.trim();
  if(!nm||!ph||!pr||!dt){ toast('Fill in Name, Phone, Price and Date'); return; }

  var bks=getBks(), eid=document.getElementById('e-id').value;
  var bk={
    id:eid||Date.now().toString(),
    name:nm, phone:ph,
    email:document.getElementById('e-email').value.trim(),
    service:document.getElementById('e-service').value,
    date:dt, time:document.getElementById('e-time').value,
    pickup:document.getElementById('e-pickup').value.trim(),
    destination:document.getElementById('e-dest').value.trim(),
    vehicle:document.getElementById('e-vehicle').value,
    passengers:document.getElementById('e-pass').value,
    price:parseFloat(pr),
    paymentMethod:document.getElementById('e-paymeth').value,
    status:document.getElementById('e-status').value,
    code:document.getElementById('e-code').value.trim(),
    notes:document.getElementById('e-notes').value.trim(),
  };

  if(eid){ var i=bks.findIndex(function(b){ return b.id===eid; }); if(i>-1) bks[i]=bk; }
  else bks.push(bk);

  setBks(bks);
  fbSave(bk); // save to Firebase cloud
  closeAdd();
  render();
  toast(eid ? 'Updated!' : 'Booking saved!' + (fbReady ? ' ☁️' : ' (local)'));
}

function delBk(id) {
  if(!confirm('Delete this booking?')) return;
  setBks(getBks().filter(function(b){ return b.id!==id; }));
  fbDelete(id);
  render();
  toast('Deleted');
}

// ── SEND PAYMENT ──
function openPay(id) {
  var b=getBks().find(function(x){ return x.id===id; });
  if(!b) return;

  // Clean short URL — booking data stored in Firebase cloud
  var link = SITE+'/payment.html?code='+encodeURIComponent(b.code);
  var fn = b.name.split(' ')[0];
  var msg = 'Hi '+fn+'! Your Seacoast RVIP ride is confirmed for '+b.date+' at '+ft(b.time)+'.\n\n'+
    'Total: $'+b.price+'\n\n'+
    'Tap the link below to complete your payment:\n'+
    link+'\n\n'+
    'Questions? Call or text (603) 000-0000\n'+
    'See you soon! — Seacoast RVIP';

  document.getElementById('m-pay-body').innerHTML =
    '<div style="background:#f9f9f9;border:1px solid #e2e2e2;padding:0.875rem;margin-bottom:1rem">'+
      '<div style="font-weight:700">'+b.name+'</div>'+
      '<div style="font-size:0.8rem;color:#555">'+b.phone+'</div>'+
      '<div style="font-size:0.8rem;color:#555">'+(b.email||'No email')+'</div>'+
    '</div>'+
    '<div style="background:#fdfaf4;border:1px solid #e8c97a;padding:1rem;margin-bottom:1rem;text-align:center">'+
      '<div style="font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:#775a19;margin-bottom:4px">Payment Link</div>'+
      '<div style="font-size:0.7rem;color:#555;word-break:break-all;margin-bottom:6px">'+link+'</div>'+
      '<div style="font-size:2rem;font-weight:700">$'+b.price+'</div>'+
    '</div>'+
    '<textarea id="msg-txt" style="width:100%;background:#f9f9f9;border:1px solid #e2e2e2;padding:0.75rem;font-size:0.8rem;font-family:Inter,sans-serif;height:130px;resize:none;outline:none;margin-bottom:0.875rem;box-sizing:border-box">'+msg+'</textarea>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'+
      '<a href="sms:'+b.phone+'&body='+encodeURIComponent(msg)+'" class="bd" style="justify-content:center;padding:0.875rem"><span class="material-symbols-outlined">sms</span>Text</a>'+
      '<a href="mailto:'+(b.email||'')+'?subject='+encodeURIComponent('Seacoast RVIP Confirmed')+'&body='+encodeURIComponent(msg)+'" class="bo" style="justify-content:center;padding:0.875rem"><span class="material-symbols-outlined">mail</span>Email</a>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">'+
      '<a href="https://wa.me/'+b.phone.replace(/\D/g,'')+'?text='+encodeURIComponent(msg)+'" target="_blank" class="bgr" style="justify-content:center;padding:0.875rem"><span class="material-symbols-outlined">chat</span>WhatsApp</a>'+
      '<button onclick="cpTxt(\''+link+'\')" class="bo" style="padding:0.875rem;justify-content:center"><span class="material-symbols-outlined">content_copy</span>Copy Link</button>'+
    '</div>'+
    '<button onclick="mkPaid(\''+id+'\')" class="bg" style="width:100%;justify-content:center;padding:0.875rem;margin-top:4px"><span class="material-symbols-outlined">check_circle</span>Mark as Paid</button>';

  document.getElementById('m-pay').style.display = 'block';
}

function closePay() { document.getElementById('m-pay').style.display = 'none'; }

function mkPaid(id) {
  var bks=getBks(), b=bks.find(function(x){ return x.id===id; });
  if(b){ b.status='Paid'; setBks(bks); }
  closePay(); render(); toast('Marked as Paid!');
}

function cpTxt(txt) {
  navigator.clipboard.writeText(txt).then(function(){ toast('Copied!'); }).catch(function(){ alert(txt); });
}

function toast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(function(){ t.style.display='none'; },3000);
}

// Close overlays on bg click
document.getElementById('m-add').addEventListener('click',function(e){ if(e.target===this) closeAdd(); });
document.getElementById('m-pay').addEventListener('click',function(e){ if(e.target===this) closePay(); });

// Init
document.addEventListener('DOMContentLoaded', function(){
  initFirebase();
  if(localStorage.getItem('rv-auth')==='1') goToDash();
  else document.getElementById('pwd').focus();
});
</script>
</body>
