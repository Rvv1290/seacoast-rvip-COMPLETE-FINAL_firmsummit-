name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Hosting + Functions + Firestore Rules
        run: npx firebase-tools@13 deploy --only hosting,functions,firestore --project seacoast-rip --token "${{ secrets.FIREBASE_TOKEN }}" --force --non-interactive
